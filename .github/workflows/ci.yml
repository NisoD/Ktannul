name: CI

on:
  push:
    branches: [master, multiplayer-rooms]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -race -count=1
      - name: cross-compile for prod (ARM64)
        run: GOOS=linux GOARCH=arm64 go build -o /dev/null .
