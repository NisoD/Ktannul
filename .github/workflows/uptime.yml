name: Uptime

# Poor man's uptime monitor: GitHub emails the repo owner when a run fails,
# and the badge in the README doubles as a status indicator.
# Note: GitHub pauses scheduled workflows after ~60 days without repo activity.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  healthz:
    runs-on: ubuntu-latest
    steps:
      - name: healthz
        run: |
          for H in mitayshvim.duckdns.org mityashvim.duckdns.org; do
            R=$(curl -sS -m 10 "https://$H/healthz")
            echo "healthz $H: $R"
            test "$R" = "ok"
          done
      - name: TLS certificate not near expiry
        run: |
          for H in mitayshvim.duckdns.org mityashvim.duckdns.org; do
            END=$(echo | openssl s_client -connect "$H:443" -servername "$H" 2>/dev/null | openssl x509 -noout -enddate | cut -d= -f2)
            echo "cert $H expires: $END"
            END_S=$(date -d "$END" +%s); NOW_S=$(date +%s)
            test $(( (END_S - NOW_S) / 86400 )) -gt 7
          done
