name: Keep-alive

# GitHub disables scheduled workflows after 60 days without repository
# activity. This commits a timestamp monthly so the uptime + CI crons keep
# running on an otherwise-quiet hobby repo.

on:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bump timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-keepalive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last-keepalive
          git commit -m "chore: keep-alive [skip ci]" || exit 0
          git push
